<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Abdelrahman ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- شاشة القفل -->
    <div id="lock-screen">

        <div class="lock-box">

            <h1>🤍 To Abdelrahman</h1>

            <p>
                This story is only for one person...
                <br><br>
                Enter our special date ❤️
            </p>

            <input
                type="text"
                id="password"
                placeholder="6/12/2025">

            <button id="unlockBtn">
                Unlock Our Story
            </button>

            <p id="error"></p>

        </div>

    </div>

    <!-- الموقع -->
    <div id="website">

        <section class="hero">

            <h1>For Abdelrahman ❤️</h1>

            <p>
                Every memory with you became a part of my heart.
            </p>

            <button id="playMusic">
                🎵 Play Our Song
            </button>
            <audio id="song" src="music/song.mp3"></audio>
        </section>

        <section id="gallery">

            <h2>Our Memories</h2>

            <div class="gallery">

                <!-- الصور هتيجي هنا -->

            </div>

        </section>

        <section id="videos">

            <h2>Our Videos</h2>

            <div class="video-container">

            </div>

        </section>

        <section id="letter">

            <h2>A Letter For You 🤍</h2>

            <p id="letterText">

            </p>

        </section>

    </div>

       <script src="script.js"></script>

</body>

</html>
